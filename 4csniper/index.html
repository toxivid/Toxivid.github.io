<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Username Sniper</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }
        button {
            margin: 10px;
            padding: 10px 20px;
            font-size: 16px;
        }
        #output {
            margin-top: 20px;
            text-align: left;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Username Sniper</h1>
        <button onclick="toggleMode(1)">4c Sniper</button>
        <button onclick="toggleMode(2)">4l Sniper</button>
        <div id="output"></div>
    </div>
<script>
let URL = "https://discord.com/api/v9/unique-username/username-attempt-unauthed";
let WEBHOOK = "https://discord.com/api/webhooks/1481767055601565867/2wW1xaqtrANoUQChqDkMZ_px5mBFi5SsDdzLHxmkLQOvWutB4OcNpy8C93VVMDQXiLpf";

let CHARS = "abcdefghijklmnopqrstuvwxyz0123456789._";
let mode = 1;

function toggleMode(m) {
    mode = m;

    if (mode === 2) {
        CHARS = "abcdefghijklmnopqrstuvwxyz";
    } else {
        CHARS = "abcdefghijklmnopqrstuvwxyz0123456789._";
    }

    document.getElementById('output').innerText =
        `Mode set to: ${mode === 1 ? '4c Sniper' : '4l Sniper'}\n`;

    startSniper();
}

function gen(length = 4) {
    let result = '';
    for (let i = 0; i < length; i++) {
        result += CHARS[Math.floor(Math.random() * CHARS.length)];
    }
    return result;
}

async function startSniper() {

    while (true) {

        const username = gen();

        try {

            const response = await fetch(URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ username })
            });

            if (response.status === 429) {
                await new Promise(r => setTimeout(r, 1000));
                continue;
            }

            const data = await response.json();
            const now = new Date().toLocaleString();

            document.getElementById('output').innerText +=
`========================
Username: ${username}
Time: ${now}
Taken: ${data.taken}
`;

            if (data.taken === false) {

                document.getElementById('output').innerText +=
`AVAILABLE: ${username}\n`;

                await fetch(WEBHOOK, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        content: `🚨 Available Username: ${username}`
                    })
                });

            }

        } catch (err) {
            console.error(err);
        }

        await new Promise(r => setTimeout(r, 100));
    }
}
</script>
</body>
</html>
