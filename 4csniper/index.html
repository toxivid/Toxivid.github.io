<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Username Sniper</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
            display: flex;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        .output {
            margin-top: 20px;
            background: #e9e9e9;
            padding: 10px;
            border: 1px solid #ccc;
            width: 100%;
            max-height: 300px;
            overflow-y: auto;
        }
        .available-list {
            margin-top: 20px;
            background: #d9d9d9;
            padding: 10px;
            border: 1px solid #ccc;
            width: 100%;
            max-height: 300px;
            overflow-y: auto;
        }
        .button-group {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Discord Username Sniper</h1>
        <div class="input-group">
            <label for="mode">Select Mode:</label>
            <select id="mode">
                <option value="4c">4c sniper</option>
                <option value="4l">4l sniper</option>
            </select>
        </div>
        <div class="button-group">
            <button onclick="startSniper()">Start Sniper</button>
            <button onclick="importResults()">Import Results</button>
        </div>
        <div class="output" id="output"></div>
        <div class="available-list" id="available-list"></div>
    </div>

    <script>
        const URL = "https://discord.com/api/v9/unique-username/username-attempt-unauthed"; // Fill in your URL here
        let availableUsernames = [];

        async function startSniper() {
            const mode = document.getElementById('mode').value;
            const outputDiv = document.getElementById('output');
            outputDiv.innerHTML = ''; // Clear previous output
            const availableList = document.getElementById('available-list');
            availableList.innerHTML = ''; // Clear previous available usernames

            const chars = mode === '4l' ? 'abcdefghijklmnopqrstuvwxyz' : 'abcdefghijklmnopqrstuvwxyz0123456789._';

            async function generateUsername(length) {
                let result = '';
                for (let i = 0; i < length; i++) {
                    result += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                return result;
            }

            while (true) {
                const username = await generateUsername(4);
                try {
                    const response = await fetch(URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: username }),
                        timeout: 10000
                    });

                    if (response.status === 429) {
                        await new Promise(resolve => setTimeout(resolve, 1000));
                        continue;
                    }

                    const now = new Date().toLocaleString();
                    const status = response.status;
                    const responseText = await response.text();

                    outputDiv.innerHTML += `
                        <div>
                            <strong>Username:</strong> ${username}<br>
                            <strong>Time:</strong> ${now}<br>
                            <strong>Status:</strong> ${status}<br>
                            <strong>Response:</strong> ${responseText}<br>
                        </div>
                    `;

                    if (!responseText.includes('taken')) {
                        availableUsernames.push(username);
                        availableList.innerHTML += `<div>${username}</div>`;
                    }
                } catch (error) {
                    console.error('Error:', error);
                }

                await new Promise(resolve => setTimeout(resolve, 10));
            }
        }

        function importResults() {
            const filePath = 'Downloads/dcusernames.txt';
            const fs = require('fs');
            if (!fs.existsSync(filePath)) {
                fs.writeFileSync(filePath, 'Available Discord Usernames\n' + '='.repeat(35) + '\n');
            }
            availableUsernames.forEach(username => {
                fs.appendFileSync(filePath, `${username} | ${new Date().toLocaleString()} | Status: 200 | Response: Available\n`);
            });
            alert('Results imported successfully!');
        }
    </script>
</body>
</html>
